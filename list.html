<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>list</title>
    <link rel="stylesheet" href="./style/font.css">
    <link rel="stylesheet" href="./style/reset.css">
    <link rel="stylesheet" href="./style/system.css">
    <link rel="stylesheet" href="./style/common.css">
    <link rel="stylesheet" href="./style/header.css">
    <link rel="stylesheet" href="./style/footer.css">
    <script src="./script/header.js"></script>
    <script src="./script/toWon.js"></script>
    <script src="./script/footer.js"></script>

    <!--  swiper js -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    
    <link rel="stylesheet" href="./style/list.css">
    <script src="./script/listArray.js"></script>
    <script src="./script/listCtrl.js"></script>
    <script src="./script/heart.js"></script>

</head>
<body>
    <div id="header-container"></div>

    <main>

        <!-- 서브 베너 -->
        <div class="sub-banner">
            <div class="common-frame">
                <h1>Daily Softness</h1>
            </div>
        </div>

        <!-- 타이틀 -->
         <div class="title">
            <div class="common-frame">
                <h3>HAND CREAM</h3>
                <p>브랜드의 시그니처 감각을 담은 타임리스 아이템</p>
            </div>
         </div>

         <!-- 옵션 -->
          <div class="option">
            <div class="common-frame">
                <div class="total-view">
                    <span>TOTAL</span>
                    <span id="current-count" class="fwb">8</span>
                </div>
                <div>
                    <select id="view-filter" class="bd2">
                        <option value="정렬">정렬</option>
                        <option value="낮은 가격순">낮은 가격순</option>
                        <option value="높은 가격순">높은 가격순</option>
                        <option value="인기순">인기순</option>
                    </select>
                </div>
            </div>
          </div>

          <!-- 상품 리스트 -->
           <div class="list-wrap">
            <div class="common-frame">
                <ul class="list-grid">
                    <li>
                        <a href="./detail.html">
                            <figure>
                                <img src="./img/menu-list1.jpg" alt="Rose Velvet">
                            </figure>
                            <div class="list-option">
                                <span class="btn-heart">
                                    <img src="./img/heart.svg" alt="좋아요">
                                </span>
                            </div>
                            <h4>Rose Velvet</h4>
                            <p class="fwm">부드러운 로즈 향</p>
                            <div class="price fwb">₩ 39,000</div>
                        </a>
                    </li>
                </ul>
            </div>
           </div>
    </main>

    <!-- 푸터 -->
    <div id="include-footer"></div>
</body>
</html>
